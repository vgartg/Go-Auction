version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: goauction
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  goauction:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/goauction?sslmode=disable
      PORT: 8080

volumes:
  postgres_data: